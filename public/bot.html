<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280, height=720">
<title>Calliope Avatar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: #000;
    font-family: system-ui, sans-serif;
  }
  #avatar-video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }
  #status-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #ccc;
    gap: 16px;
  }
  #status-overlay.hidden { display: none; }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #333;
    border-top-color: #aaa;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status-text { font-size: 18px; }
  #error-text { color: #e55; font-size: 14px; max-width: 600px; text-align: center; }
</style>
</head>
<body>

<div id="status-overlay">
  <div class="spinner"></div>
  <div id="status-text">Initializing...</div>
  <div id="error-text"></div>
</div>

<video id="avatar-video" autoplay playsinline muted></video>

<script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
<script>
const { Room, RoomEvent, Track } = LivekitClient;

const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session");

const statusOverlay = document.getElementById("status-overlay");
const statusText = document.getElementById("status-text");
const errorText = document.getElementById("error-text");
const videoEl = document.getElementById("avatar-video");

function setStatus(msg) {
  statusText.textContent = msg;
  console.log("[bot]", msg);
}

function setError(msg) {
  errorText.textContent = msg;
  console.error("[bot]", msg);
}

async function fetchCreds(retries = 30) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(`/api/sessions/${sessionId}/creds`);
      if (res.ok) return res.json();
      if (res.status === 425) {
        await new Promise((r) => setTimeout(r, 2000));
        continue;
      }
      throw new Error(`HTTP ${res.status}`);
    } catch (err) {
      if (i === retries - 1) throw err;
      await new Promise((r) => setTimeout(r, 2000));
    }
  }
}

async function start() {
  if (!sessionId) {
    setError("Missing ?session= parameter");
    return;
  }

  // 1. Get LiveKit credentials from our server
  setStatus("Fetching connection details...");
  const creds = await fetchCreds();

  // 2. Connect to the LiveKit room
  setStatus("Connecting to avatar...");
  const room = new Room({
    adaptiveStream: true,
    dynacast: true,
  });

  room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
    if (track.kind === Track.Kind.Video) {
      track.attach(videoEl);
      videoEl.style.display = "block";
      statusOverlay.classList.add("hidden");
    }
    if (track.kind === Track.Kind.Audio) {
      // Attach audio — it plays through the page, which Recall streams into the meeting
      const audioEl = track.attach();
      audioEl.volume = 1.0;
      document.body.appendChild(audioEl);
    }
  });

  room.on(RoomEvent.TrackUnsubscribed, (track) => {
    track.detach().forEach((el) => el.remove());
  });

  room.on(RoomEvent.Disconnected, () => {
    setStatus("Disconnected");
    statusOverlay.classList.remove("hidden");
    videoEl.style.display = "none";
  });

  await room.connect(creds.url, creds.token);
  setStatus("Connected — waiting for avatar video...");

  // 3. Capture meeting audio via getUserMedia and publish to the LiveKit room
  //    In Recall's bot browser, getUserMedia returns the meeting's audio stream
  try {
    const meetingStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false,
      },
    });
    const audioTrack = meetingStream.getAudioTracks()[0];
    await room.localParticipant.publishTrack(audioTrack, {
      name: "meeting-audio",
    });
    console.log("[bot] Meeting audio published to LiveKit");
  } catch (err) {
    console.warn("[bot] Could not capture meeting audio:", err.message);
    // Non-fatal — avatar will still work, just won't hear meeting participants
  }
}

start().catch((err) => {
  setStatus("Failed to start");
  setError(err.message);
});
</script>

</body>
</html>
